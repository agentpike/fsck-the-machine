<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | escape }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/logo/nav.svg' | relative_url }}" alt="" class="site-logo">
      <span class="site-title">{{ site.title | escape }}</span>
    </a>
  </header>
  <main class="content">
    {{ content }}
  </main>
  <script src="{{ '/assets/js/firm-replace.js' | relative_url }}"></script>
</body>
</html>
